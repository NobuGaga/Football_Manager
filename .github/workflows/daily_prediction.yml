name: Daily Football Prediction

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 2点 = 北京时间10点
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 pandas numpy scipy lxml openpyxl matplotlib
    - name: Run pipeline
      run: |
        python3 main.py init
        python3 main.py all
    - name: Upload reports
      uses: actions/upload-artifact@v3
      with:
        name: prediction-reports
        path: reports/
        retention-days: 30
