name: Daily Football Prediction

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  predict:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5  # ← 升级到 v5 (Node 24)
    
    - name: Setup Python
      uses: actions/setup-python@v5  # ← 保持 v5（已支持 Node 24）
    
    - name: Create directories
      run: mkdir -p data reports
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas numpy scipy lxml openpyxl
    
    - name: Initialize database
      run: python3 main.py init
    
    - name: Scrape matches
      run: python3 main.py scrape
      continue-on-error: true
    
    - name: Generate predictions
      run: python3 main.py predict
    
    - name: Generate report
      run: python3 main.py report
    
    - name: Set date variable
      id: date
      run: echo "DATE=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
    
    - name: Upload reports
      uses: actions/upload-artifact@v5  # ← 升级到 v5 (Node 24)
      with:
        name: prediction-reports-${{ steps.date.outputs.DATE }}
        path: reports/
        retention-days: 30
    
    - name: Commit database updates
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -f data/football.db
        git diff --staged --quiet || (git commit -m "Update database: $(date +%Y-%m-%d)" && git push https://${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git HEAD:${GITHUB_REF#refs/heads/})
      continue-on-error: true